services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "8081:8081"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - dataset-toolbox
      - label-studio
    networks:
      - pipeline-network

  dataset-toolbox:
    build:
      context: .
    volumes:
      - /home/aw/data/masters:/data
    environment:
      - STORAGE_SECRET=${STORAGE_SECRET:-change-me}
      - LABEL_STUDIO_URL=http://localhost:8081
      - SAM2_ML_BACKEND_URL=http://sam2-ml-backend:9090
      - DATA_ROOT=/data
    networks:
      - pipeline-network

  label-studio:
    image: heartexlabs/label-studio:latest
    volumes:
      - ls-data:/label-studio/data
      - /home/aw/data/masters/in_progress:/label-studio/files:ro
    environment:
      - LABEL_STUDIO_LOCAL_FILES_SERVING_ENABLED=true
      - LABEL_STUDIO_LOCAL_FILES_DOCUMENT_ROOT=/label-studio/files
      - CSRF_TRUSTED_ORIGINS=http://localhost,http://localhost:8081
    networks:
      - pipeline-network

  sam2-ml-backend:
    build:
      context: ./ls_and_ml_backend/sam2/label-studio-ml-backend/
      dockerfile: label_studio_ml/examples/segment_anything_2_image/Dockerfile
    environment:
      - LABEL_STUDIO_URL=http://label-studio:8080
      - LABEL_STUDIO_API_KEY=${LS_API_KEY}
      - DEVICE=cuda
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    profiles:
      - gpu
    depends_on:
      - label-studio
    networks:
      - pipeline-network

volumes:
  ls-data:

networks:
  pipeline-network:
    driver: bridge
